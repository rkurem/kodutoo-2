<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Typer</title>
</head>
 
<body>
<header>
    <div class="logo">Typer</div>
 
    <div class="center-controls">
        <!--https://www.w3schools.com/tags/att_option_value.asp-->
        <select id="duration">
            <option value="15">15s</option>
            <option value="30">30s</option>
        </select>
 
        <select id="difficulty">
            <option value="easy">Kerge</option>
            <option value="medium">Keskmine</option>
            <option value="hard">Raske</option>
        </select>
 
        <button id="startBtn">Start Game</button>
    </div>
 
    <div class="right">
        <button id="themeToggle">🌙</button>
        <button id="showResults">Leaderboard</button>
    </div>
</header>
 
<main>
    <div id="gameArea">
        <div id="countdown"></div>
        <div id="word"></div>
        <input type="text" id="mainInput" placeholder="Sisesta nimi">
        <div id="wordcount"></div>
    </div>
</main>
 
<!-- https://www.w3schools.com/howto/howto_css_modals.asp -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="close">&times;</span>
        <div id="resultDetails"></div>
        <img id="speedImage">
        <h3>Leaderboard</h3>
        <div id="results"></div>
    </div>
</div>
 
</body>
</html>
